  <style>
    @font-face {
      font-family: "Gros Ventre";
      src: url("font/Gros%20Ventre%20Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Gros Ventre";
      src: url("font/Gros%20Ventre%20Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Gros Ventre";
      src: url("font/Gros%20Ventre%20Light.ttf") format("truetype");
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Gros Ventre";
      src: url("font/Gros%20Ventre%20Semibold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --blue: #090c9b;
      --ink: #3c3744;
      --muted: rgba(60, 55, 68, 0.68);
      --line: rgba(9, 12, 155, 0.12);
      --grid: #e2e2e2;
      --bg: #ffffff;
      --card: rgba(255, 255, 255, 0.86);
      --shadow: 0 18px 60px rgba(9, 12, 155, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Gros Ventre", Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
    }

    .taplink-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .taplink-card {
      width: min(100%, 460px);
      padding: 32px 20px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .taplink-logo {
      display: block;
      width: min(100%, 260px);
      height: auto;
      margin: 0 auto 28px;
    }

    .taplink-links {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .taplink-links + .taplink-links {
      margin-top: 24px;
    }

    .taplink-link {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
      padding: 0 18px;
      border: 1px solid var(--blue);
      background: #fff;
      color: var(--blue);
      font-size: 17px;
      font-weight: 550;
      line-height: 1;
      text-decoration: none;
      transition: background-color 160ms ease, color 160ms ease, transform 120ms ease, opacity 160ms ease;
    }

    .taplink-link::after {
      content: "";
      flex: 0 0 auto;
      margin-left: auto;
      width: 11px;
      height: 11px;
      border-top: 1.8px solid currentColor;
      border-right: 1.8px solid currentColor;
      transform: rotate(45deg);
      transition: transform 160ms ease;
    }

    .taplink-link-icon {
      width: 24px;
      height: 24px;
      flex: 0 0 24px;
      display: block;
      object-fit: contain;
    }

    .taplink-link:hover,
    .taplink-link:focus-visible {
      background: var(--blue);
      color: #fff;
      outline: 0;
    }

    .taplink-link:hover::after,
    .taplink-link:focus-visible::after {
      transform: translate(2px, -2px) rotate(45deg);
    }

    .taplink-link:hover .taplink-link-icon,
    .taplink-link:focus-visible .taplink-link-icon {
      filter: brightness(0) invert(1);
    }

    .taplink-link:active {
      opacity: 0.72;
      transform: translateY(1px);
    }

    @media (max-width: 480px) {
      .taplink-page {
        align-items: flex-start;
        padding-top: 24px;
      }

      .taplink-card {
        padding: 28px 16px 20px;
      }

      .taplink-logo {
        width: min(100%, 230px);
        margin-bottom: 24px;
      }

      .taplink-link {
        min-height: 54px;
        padding-inline: 16px;
        font-size: 16px;
      }
    }
  </style>
</head>
