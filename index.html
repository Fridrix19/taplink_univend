<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UniVend — ссылки</title>
  <style>
    :root {
      --blue: #090c9b;
      --ink: #3c3744;
      --muted: rgba(60, 55, 68, 0.68);
      --line: rgba(9, 12, 155, 0.12);
      --bg: #ffffff;
      --card: rgba(255, 255, 255, 0.86);
      --shadow: 0 18px 60px rgba(9, 12, 155, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(to right, var(--line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--line) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
    }

    .taplink-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .taplink-card {
      width: min(100%, 460px);
      padding: 32px 20px 24px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .taplink-logo {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      background: var(--blue);
      color: #fff;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .taplink-title {
      margin: 0;
      color: var(--blue);
      font-size: 32px;
      font-weight: 800;
      line-height: 1.05;
      text-align: center;
    }

    .taplink-subtitle {
      margin: 12px auto 28px;
      max-width: 340px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.35;
      text-align: center;
    }

    .taplink-links {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .taplink-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
      padding: 0 18px;
      border: 1px solid var(--blue);
      background: #fff;
      color: var(--blue);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
      transition: background-color 160ms ease, color 160ms ease, transform 120ms ease, opacity 160ms ease;
    }

    .taplink-link::after {
      content: "→";
      flex: 0 0 auto;
      margin-left: 16px;
      font-size: 22px;
      line-height: 1;
    }

    .taplink-link:hover,
    .taplink-link:focus-visible {
      background: var(--blue);
      color: #fff;
      outline: 0;
    }

    .taplink-link:active {
      opacity: 0.72;
      transform: translateY(1px);
    }

    .taplink-note {
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
    }

    @media (max-width: 480px) {
      .taplink-page {
        align-items: flex-start;
        padding-top: 24px;
      }

      .taplink-card {
        padding: 28px 16px 20px;
      }

      .taplink-title {
        font-size: 28px;
      }

      .taplink-link {
        min-height: 54px;
        padding-inline: 16px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="taplink-page" aria-label="Страница ссылок UniVend">
    <section class="taplink-card">
      <div class="taplink-logo" aria-hidden="true">UV</div>
      <h1 class="taplink-title">UniVend</h1>
      <p class="taplink-subtitle">Быстрые ссылки, контакты и важная информация. Позже сюда можно добавить всё нужное.</p>

      <ul class="taplink-links">
        <li><a class="taplink-link" href="#">Основная ссылка</a></li>
        <li><a class="taplink-link" href="#">Каталог / услуги</a></li>
        <li><a class="taplink-link" href="#">Написать в Telegram</a></li>
        <li><a class="taplink-link" href="#">Группа ВКонтакте</a></li>
        <li><a class="taplink-link" href="#">Контакты</a></li>
      </ul>

      <p class="taplink-note">Черновая отдельная страница, не подключенная к навигации проекта.</p>
    </section>
  </main>
</body>
</html>
